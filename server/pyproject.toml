# Tooling config only; dependencies live in requirements*.txt so the Docker
# layer caching stays simple with a bind-mounted source tree.

[tool.ruff]
line-length = 88
target-version = "py312"
# Autogenerated migrations aren't hand-groomed; don't lint them.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # bugbear
  "SIM", # simplify
]

[tool.ruff.lint.isort]
known-first-party = ["app"]
# The local alembic/ migrations dir shadows the installed package's name;
# without this, ruff classifies `from alembic import ...` as first-party.
known-third-party = ["alembic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
